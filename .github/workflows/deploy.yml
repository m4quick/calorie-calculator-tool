name: Deploy to Hosting

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Validate HTML
      run: |
        # Check index.html exists and has content
        if [ ! -f "index.html" ]; then
          echo "❌ index.html missing"
          exit 1
        fi
        
        # Check file size (must have substantial content)
        FILE_SIZE=$(stat -c%s "index.html")
        if [ $FILE_SIZE -lt 5000 ]; then
          echo "❌ index.html too small ($FILE_SIZE bytes), likely thin content"
          exit 1
        fi
        
        echo "✅ HTML validation passed"
    
    - name: Check for required content sections
      run: |
        # Check for educational content sections
        if ! grep -q "How It Works" index.html; then
          echo "❌ Missing 'How It Works' section"
          exit 1
        fi
        
        if ! grep -q "FAQ\|Frequently Asked" index.html; then
          echo "❌ Missing FAQ section"
          exit 1
        fi
        
        echo "✅ Content sections validated"
    
    - name: Check for policy compliance files
      run: |
        # Required files for Google AdSense
        for file in privacy.html terms.html cookies.html ads.txt; do
          if [ ! -f "$file" ]; then
            echo "❌ Missing $file (required for AdSense)"
            exit 1
          fi
        done
        
        echo "✅ Policy files validated"

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to Cloudflare Pages
      uses: cloudflare/pages-action@v1
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        projectName: calorie-calculator-tool
        directory: .
        gitHubToken: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Verify Deployment
      run: |
        echo "✅ Deployed to Cloudflare Pages"
        echo "Site URL: https://calorie-calculator-tool.pages.dev"

  notify:
    needs: [validate, deploy]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Notify Status
      run: |
        if [ "${{ needs.deploy.result }}" == "success" ]; then
          echo "🚀 Deployment successful!"
        else
          echo "❌ Deployment failed"
          exit 1
        fi
