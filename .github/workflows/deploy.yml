name: Deploy to Hosting

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Validate HTML
      run: |
        # Check index.html exists and has content
        if [ ! -f "index.html" ]; then
          echo "❌ index.html missing"
          exit 1
        fi
        
        # Check file size (must have substantial content)
        FILE_SIZE=$(stat -c%s "index.html")
        if [ $FILE_SIZE -lt 5000 ]; then
          echo "❌ index.html too small ($FILE_SIZE bytes), likely thin content"
          exit 1
        fi
        
        echo "✅ HTML validation passed"
    
    - name: Check for required content sections
      run: |
        # Check for educational content sections
        if ! grep -q "How It Works" index.html; then
          echo "❌ Missing 'How It Works' section"
          exit 1
        fi
        
        if ! grep -q "FAQ\|Frequently Asked" index.html; then
          echo "❌ Missing FAQ section"
          exit 1
        fi
        
        echo "✅ Content sections validated"
    
    - name: Check for policy compliance files
      run: |
        # Required files for Google AdSense
        for file in privacy.html terms.html cookies.html ads.txt; do
          if [ ! -f "$file" ]; then
            echo "❌ Missing $file (required for AdSense)"
            exit 1
          fi
        done
        
        echo "✅ Policy files validated"

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to Server
      env:
        DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        SERVER_HOST: ${{ secrets.SERVER_HOST }}
        SERVER_USER: ${{ secrets.SERVER_USER }}
      run: |
        # Setup SSH
        mkdir -p ~/.ssh
        echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        
        # Add host to known hosts
        ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts 2>/dev/null
        
        # Deploy via SCP to user's home directory (no sudo needed)
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST "mkdir -p ~/www/calorie-calculator-tool/"
        scp -i ~/.ssh/deploy_key -r ./* $SERVER_USER@$SERVER_HOST:~/www/calorie-calculator-tool/
        
        echo "✅ Deployed successfully"
    
    - name: Verify Deployment
      run: |
        # Wait for deployment
        sleep 5
        
        # Check site is live
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://calorie-calculator-tool.com)
        if [ "$STATUS" != "200" ]; then
          echo "❌ Site returned HTTP $STATUS"
          exit 1
        fi
        
        echo "✅ Site is live"

  notify:
    needs: [validate, deploy]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Notify Status
      run: |
        if [ "${{ needs.deploy.result }}" == "success" ]; then
          echo "🚀 Deployment successful!"
        else
          echo "❌ Deployment failed"
          exit 1
        fi
